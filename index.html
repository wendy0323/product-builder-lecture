<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">🌙 Dark Mode</button>
  <div class="container">
    <h1>Lotto Number Generator</h1>
    <div class="numbers" id="numbers-container"></div>
    <button id="generate-button">Generate Numbers</button>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid var(--number-border);">

    <div class="contact-form">
      <h2>제휴 문의</h2>
      <form action="https://formspree.io/f/xqeyzebj" method="POST">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit">문의 보내기</button>
      </form>
    </div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
